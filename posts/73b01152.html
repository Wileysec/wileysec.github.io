  July 7, 2019
  

  <h1 class="post-title">php curl工具学习</h1>
  <section class="post-content article-entry">
    <p>php的curl工具用的不是很多，准确来说是根本不会使用，现在来学习记录一下。</p>
<a id="more"></a>

<h2 id="建立简单Curl基本步骤"><a href="#建立简单Curl基本步骤" class="headerlink" title="建立简单Curl基本步骤"></a>建立简单Curl基本步骤</h2><figure class="highlight php"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">&lt;?php</span></span><br><span class="line"></span><br><span class="line">$curl = curl_init(<span class="string">"http://www.baidu.com"</span>);</span><br><span class="line"></span><br><span class="line">curl_exec($url);</span><br><span class="line"></span><br><span class="line">curl_close()</span><br><span class="line"></span><br><span class="line"><span class="meta">?&gt;</span></span><br></pre></td></tr></table></figure>

<p>这里，基本步骤是非常简单的，但是最麻烦的是设置curl的选项。</p>
<h2 id="Curl选项"><a href="#Curl选项" class="headerlink" title="Curl选项"></a>Curl选项</h2><figure class="highlight php"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">&lt;?php</span></span><br><span class="line"></span><br><span class="line">$curl = curl_init();</span><br><span class="line"></span><br><span class="line">curl_setopt($curl,CURLOPT_URL,<span class="string">"http://www.baidu.com"</span>);</span><br><span class="line"></span><br><span class="line">curl_exec($url);</span><br><span class="line"></span><br><span class="line">curl_close()</span><br><span class="line"></span><br><span class="line"><span class="meta">?&gt;</span></span><br></pre></td></tr></table></figure>

<p>当然，也可以使用curl选项设置url。</p>
<figure class="highlight php"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br></pre></td><td class="code"><pre><span class="line">curl_setopt($curl,CURLOPT_RETURNTRANSFER,<span class="number">1</span>); <span class="comment">// 将返回值作为字符串返回，而不是直接输出</span></span><br><span class="line"></span><br><span class="line">curl_setopt($curl,CURLOPT_HEADER,<span class="number">1</span>); <span class="comment">// 在输出中包含标头</span></span><br><span class="line"></span><br><span class="line">curl_setopt($curl,CURLOPT_COOKIEJAR,$cookie_file);</span><br><span class="line"></span><br><span class="line">curl_setopt($curl,CURLOPT_COOKIEFILE,$cookie_file);</span><br><span class="line"></span><br><span class="line">curl_setopt($curl,CURLOPT_HTTPHEADER,<span class="keyword">array</span>(<span class="string">"User-Agent: Mozilla/5.0"</span>)); <span class="comment">// 设置额外的HTTP标头信息</span></span><br><span class="line"></span><br><span class="line">curl_setopt($curl,CURLOPT_POST,<span class="number">1</span>); <span class="comment">// POST提交数据 同HTML FORM表单提交</span></span><br><span class="line"></span><br><span class="line">curl_setopt($curl,CURLOPT_POSTFILEDS,$string); <span class="comment">// POST提交参数</span></span><br></pre></td></tr></table></figure>
