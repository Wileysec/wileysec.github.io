  <h1 class="post-title">MySQL删除重复数据并重置ID自增</h1>
  <section class="post-content article-entry">
    <p>在开发测试中，常常遇到重复数据过多，自增的ID随着数据的删除变得凌乱了起来。今天分享一下，我在开发测试中使用的MySQL删除重复数据并重置ID自增SQL语句。</p>
<h3 id="删除重复数据只保留一条"><a href="#删除重复数据只保留一条" class="headerlink" title="删除重复数据只保留一条"></a>删除重复数据只保留一条</h3><figure class="highlight sql"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">DELETE</span> <span class="keyword">FROM</span> userlist <span class="keyword">WHERE</span> (username,<span class="keyword">password</span>) <span class="keyword">IN</span> (<span class="keyword">SELECT</span> username,<span class="keyword">password</span> <span class="keyword">FROM</span> (<span class="keyword">SELECT</span> username,<span class="keyword">password</span> <span class="keyword">FROM</span> userlist <span class="keyword">GROUP</span> <span class="keyword">BY</span> username,<span class="keyword">password</span> <span class="keyword">HAVING</span> <span class="keyword">COUNT</span>(*)&gt;<span class="number">1</span>) s1) <span class="keyword">AND</span> <span class="keyword">id</span> <span class="keyword">NOT</span> <span class="keyword">in</span> (<span class="keyword">SELECT</span> <span class="keyword">id</span> <span class="keyword">FROM</span> (<span class="keyword">SELECT</span> <span class="keyword">id</span> <span class="keyword">FROM</span> userlist <span class="keyword">GROUP</span> <span class="keyword">BY</span> username,<span class="keyword">password</span> <span class="keyword">HAVING</span> <span class="keyword">COUNT</span>(*)&gt;<span class="number">1</span>)s2);</span><br></pre></td></tr></table></figure>

<h3 id="重置ID自增"><a href="#重置ID自增" class="headerlink" title="重置ID自增"></a>重置ID自增</h3><figure class="highlight sql"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">alter</span> <span class="keyword">table</span> userlist <span class="keyword">drop</span> <span class="keyword">id</span>;</span><br><span class="line"><span class="keyword">alter</span> <span class="keyword">table</span> userlist <span class="keyword">add</span> <span class="keyword">id</span> <span class="built_in">int</span>(<span class="number">255</span>) <span class="keyword">not</span> <span class="literal">null</span> <span class="keyword">first</span>;</span><br><span class="line"><span class="keyword">alter</span> <span class="keyword">table</span> userlist <span class="keyword">modify</span> <span class="keyword">column</span> <span class="keyword">id</span> <span class="built_in">int</span>(<span class="number">255</span>) <span class="keyword">not</span> <span class="literal">null</span> auto_increment,<span class="keyword">add</span> primary <span class="keyword">key</span>(<span class="keyword">id</span>);</span><br><span class="line"><span class="keyword">select</span> * <span class="keyword">from</span> userlist <span class="keyword">order</span> <span class="keyword">by</span> <span class="keyword">id</span>;</span><br></pre></td></tr></table></figure>
